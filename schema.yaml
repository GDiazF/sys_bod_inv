components:
  schemas:
    ActivoTokenObtainPairRequest:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    ActivoTokenRefresh:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    ActivoTokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    Adjunto:
      type: object
      description: ModelSerializer con FKs acotados por empresa del request.
      properties:
        id:
          type: integer
          readOnly: true
        modulo:
          type: string
          maxLength: 50
        documento_id:
          type: string
          maxLength: 50
        nombre_archivo:
          type: string
          maxLength: 255
        ruta_archivo:
          type: string
          readOnly: true
        mime_type:
          type: string
          nullable: true
          maxLength: 100
        created_at:
          type: string
          format: date-time
          readOnly: true
        empresa:
          type: integer
          readOnly: true
        subido_por:
          type: integer
          readOnly: true
          nullable: true
      required:
      - created_at
      - documento_id
      - empresa
      - id
      - modulo
      - nombre_archivo
      - ruta_archivo
      - subido_por
    AdjuntoRequest:
      type: object
      description: ModelSerializer con FKs acotados por empresa del request.
      properties:
        modulo:
          type: string
          minLength: 1
          maxLength: 50
        documento_id:
          type: string
          minLength: 1
          maxLength: 50
        nombre_archivo:
          type: string
          minLength: 1
          maxLength: 255
        mime_type:
